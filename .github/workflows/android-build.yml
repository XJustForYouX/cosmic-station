name: android
on:
  workflow_dispatch:
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with: 
          submodules: 'recursive'
      - name: build
        run: |
          cd cosmic-station
          ./gradlew assembleRelease 
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: cosmic.apk
          path: cosmic-station/src/main/app/build/outputs/apk/release/*.apk
