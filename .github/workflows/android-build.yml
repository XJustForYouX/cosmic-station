name: android
on:
  workflow_dispatch:
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with: 
          submodules: 'recursive'
      - name: build
        run: ./gradlew assembleRelease -Dorg.gradle.java.home=/usr/lib/jvm/temurin-17-jdk-amd64
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: cosmic.apk
          path: cosmic-station/app/build/outputs/apk/release/*.apk
